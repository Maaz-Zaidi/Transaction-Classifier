# transaction classification rules
# these run on cleaned transaction strings
# rule types: contains, regex, exact
# higher priority runs first
#
# rules only handle transaction structure
# merchant names should go through the kb or model

rules:
  # financial services

  - pattern: "E-TRANSFER-OUT"
    category: "Financial Services"
    type: contains
    priority: 200

  - pattern: "TRANSFER"
    category: "Financial Services"
    type: contains
    priority: 100

  - pattern: "MORTGAGE"
    category: "Financial Services"
    type: contains
    priority: 150

  - pattern: "LOAN\\s*(PMT|PAYMENT)"
    category: "Financial Services"
    type: regex
    priority: 150

  - pattern: "CREDIT\\s*CARD\\s*(PMT|PAYMENT)"
    category: "Financial Services"
    type: regex
    priority: 150

  - pattern: "NSF"
    category: "Financial Services"
    type: contains
    priority: 100

  - pattern: "OVERDRAFT"
    category: "Financial Services"
    type: contains
    priority: 100

  - pattern: "SERVICE\\s*CHARGE"
    category: "Financial Services"
    type: regex
    priority: 100

  - pattern: "MONTHLY FEE"
    category: "Financial Services"
    type: contains
    priority: 100

  # income

  - pattern: "E-TRANSFER-IN"
    category: "Income"
    type: contains
    priority: 200

  - pattern: "PAYROLL"
    category: "Income"
    type: contains
    priority: 200

  - pattern: "SALARY"
    category: "Income"
    type: contains
    priority: 200

  - pattern: "DEPOSIT"
    category: "Income"
    type: contains
    priority: 100

  - pattern: "REFUND"
    category: "Income"
    type: contains
    priority: 100

  - pattern: "CASH\\s*BACK"
    category: "Income"
    type: regex
    priority: 90

  # government and legal

  - pattern: "CRA\\b"
    category: "Government & Legal"
    type: regex
    priority: 100

  - pattern: "CANADA\\s*REVENUE"
    category: "Government & Legal"
    type: regex
    priority: 100

  - pattern: "SERVICE\\s*CANADA"
    category: "Government & Legal"
    type: regex
    priority: 100

  - pattern: "SERVICE\\s*ONTARIO"
    category: "Government & Legal"
    type: regex
    priority: 100

  - pattern: "GOV\\s*(OF|'T)"
    category: "Government & Legal"
    type: regex
    priority: 100

  - pattern: "TAX\\b"
    category: "Government & Legal"
    type: regex
    priority: 80

  # generic service words, not merchant brands

  # transportation
  - pattern: "PARKING"
    category: "Transportation"
    type: contains
    priority: 100

  # healthcare and medical
  - pattern: "PHARMACY"
    category: "Healthcare & Medical"
    type: contains
    priority: 100

  - pattern: "DENTAL"
    category: "Healthcare & Medical"
    type: contains
    priority: 100

  - pattern: "HOSPITAL"
    category: "Healthcare & Medical"
    type: contains
    priority: 100

  - pattern: "CLINIC"
    category: "Healthcare & Medical"
    type: contains
    priority: 80

  - pattern: "OPTOM"
    category: "Healthcare & Medical"
    type: contains
    priority: 100

  # entertainment and recreation
  - pattern: "GYM"
    category: "Entertainment & Recreation"
    type: contains
    priority: 80

  - pattern: "FITNESS"
    category: "Entertainment & Recreation"
    type: contains
    priority: 80
